name: Deploy CraveBetter to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the workflow on push to the main branch

permissions:
  contents: write # Required for deploying to the gh-pages branch

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🛠️
        run: npm ci

      - name: Build Application 🚀
        run: npm run build

      - name: Deploy to GitHub Pages 🌐
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite builds into
          branch: gh-pages # The branch the action will deploy to
